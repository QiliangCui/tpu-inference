# pipeline-name: Qwen/Qwen3.6-35B-A3B
# pipeline-type: multimodal
steps:
  - label: "${TPU_VERSION:-tpu7x} Unit tests for Qwen/Qwen3.6-35B-A3B"
    key: "${TPU_VERSION:-tpu7x}_Qwen_Qwen3_6-35B-A3B_UnitTest"
    agents:
      queue: "${TPU_QUEUE_MULTI:-tpu_v7x_8_queue}"
    soft_fail: true
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'SKIP_JAX_PRECOMPILE=1 VLLM_XLA_CHECK_RECOMPILATION=0 MODEL_IMPL_TYPE=vllm python /workspace/tpu_inference/examples/offline_inference.py \
            --model Qwen/Qwen3.6-35B-A3B \
            --tensor-parallel-size 8 \
            --max-num-batched-tokens 16384 \
            --max-num-seqs 256 \
            --max-model-len 4096 \
            --limit-mm-per-prompt "{\"image\": 0, \"video\": 0}" \
            --chat-template-kwargs="{\"enable_thinking\": false}"'

  - label: "${TPU_VERSION:-tpu7x} Record unit test result for Qwen/Qwen3.6-35B-A3B"
    key: "${TPU_VERSION:-tpu7x}_record_Qwen_Qwen3_6-35B-A3B_UnitTest"
    depends_on: "${TPU_VERSION:-tpu7x}_Qwen_Qwen3_6-35B-A3B_UnitTest"
    env:
      CI_TPU_VERSION: "${TPU_VERSION:-tpu7x}"
      CI_TARGET: "Qwen/Qwen3.6-35B-A3B"
      CI_STAGE: "UnitTest"
      CI_CATEGORY: "multimodal"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TPU_VERSION:-tpu7x}_Qwen_Qwen3_6-35B-A3B_UnitTest

  - label: "${TPU_VERSION:-tpu7x} Accuracy for Qwen/Qwen3.6-35B-A3B"
    key: "${TPU_VERSION:-tpu7x}_Qwen_Qwen3_6-35B-A3B_Accuracy"
    depends_on: "${TPU_VERSION:-tpu7x}_record_Qwen_Qwen3_6-35B-A3B_UnitTest"
    agents:
      queue: "${TPU_QUEUE_MULTI:-tpu_v7x_8_queue}"
    soft_fail: true
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/check_lm_eval.sh \
          --model_name "Qwen/Qwen3.6-35B-A3B" \
          --use_moe_ep_kernel 0 \
          --tensor_parallel_size 8 \
          --max_model_len 4096 \
          --max_num_batched_tokens 16384 \
          --max_gen_toks 2048 \
          --enable_expert_parallel 0 \
          --flex_threshold 0.60 \
          --strict_threshold 0.60 \
          --limit_mm_per_prompt '{"image": 0, "video": 0}' \
          --enable_thinking false \
          --block_size 256 \
          --limit 100

  - label: "${TPU_VERSION:-tpu7x} Record integration test result for Qwen/Qwen3.6-35B-A3B"
    key: "${TPU_VERSION:-tpu7x}_record_Qwen_Qwen3_6-35B-A3B_Accuracy"
    depends_on: "${TPU_VERSION:-tpu7x}_Qwen_Qwen3_6-35B-A3B_Accuracy"
    env:
      CI_TPU_VERSION: "${TPU_VERSION:-tpu7x}"
      CI_TARGET: "Qwen/Qwen3.6-35B-A3B"
      CI_STAGE: "Accuracy/Correctness"
      CI_CATEGORY: "multimodal"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh ${TPU_VERSION:-tpu7x}_Qwen_Qwen3_6-35B-A3B_Accuracy
