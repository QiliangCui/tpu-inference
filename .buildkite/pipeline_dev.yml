  # ============================================================
  # Section B: Decode benchmark (offline LLM API, prefix caching)
  # Isolates pure decode performance: seed KV cache, then measure
  # decode with cached prefill. Batch sizes: [1,4,8,16,32] @ 8K
  # and [1,8,16,32,64] @ 1K.
  # ============================================================

  - label: "DECODE GMM_EP (offline)"
    key: decode_gmm
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      USE_MOE_EP_KERNEL: "0"
      MODEL_IMPL_TYPE: "vllm"
    commands:
      - .buildkite/scripts/run_in_docker.sh python3 /workspace/tpu_inference/tests/e2e/benchmarking/decode_bench.py --model Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8 --download-dir /tmp/hf_home --tensor-parallel-size 8 --enable-expert-parallel --max-model-len 10240 --max-num-batched-tokens 8192 --max-num-seqs 512 --kv-cache-dtype fp8 --gpu-memory-utilization 0.85 --seed 42

  - label: "DECODE fused_EP (offline)"
    key: decode_fused
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      USE_MOE_EP_KERNEL: "1"
      MODEL_IMPL_TYPE: "vllm"
    commands:
      - .buildkite/scripts/run_in_docker.sh python3 /workspace/tpu_inference/tests/e2e/benchmarking/decode_bench.py --model Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8 --download-dir /tmp/hf_home --tensor-parallel-size 8 --enable-expert-parallel --max-model-len 10240 --max-num-batched-tokens 8192 --max-num-seqs 512 --kv-cache-dtype fp8 --gpu-memory-utilization 0.85 --seed 42
