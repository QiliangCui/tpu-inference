# Dev pipeline — Attempt 2: 480B Qwen3-Coder GMM_EP vs fused_EP
# Uses same model as CI: Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8
# ISL=1024/OSL=8192 matches CI benchmark (bm_qwen3_coder.sh)

steps:

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # 480B GMM_EP ISL=1024 OSL=8192 (matches CI benchmark)
  - label: "480B GMM_EP ISL1024-OSL8192"
    key: 480b_gmm_ep
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8"
      TENSOR_PARALLEL_SIZE: "8"
      MAX_NUM_BATCHED_TOKENS: "8192"
      MAX_NUM_SEQS: "512"
      MAX_MODEL_LEN: "10240"
      INPUT_LEN: "1024"
      OUTPUT_LEN: "8192"
      NUM_PROMPTS: "320"
      ENABLE_EXPERT_PARALLEL: "1"
      KV_CACHE_DTYPE: "fp8"
      GPU_MEMORY_UTILIZATION: "0.95"
      MAX_CONCURRENCY: "64"
      RANDOM_RANGE_RATIO: "0.8"
      REQUEST_RATE: "inf"
      EXTRA_SERVER_ARGS: "--seed=42 --no-enable-prefix-caching --async-scheduling"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh

  # 480B fused_EP ISL=1024 OSL=8192
  - label: "480B fused_EP ISL1024-OSL8192"
    key: 480b_fused_ep
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8"
      TENSOR_PARALLEL_SIZE: "8"
      MAX_NUM_BATCHED_TOKENS: "8192"
      MAX_NUM_SEQS: "512"
      MAX_MODEL_LEN: "10240"
      INPUT_LEN: "1024"
      OUTPUT_LEN: "8192"
      NUM_PROMPTS: "320"
      ENABLE_EXPERT_PARALLEL: "1"
      USE_MOE_EP_KERNEL: "1"
      KV_CACHE_DTYPE: "fp8"
      GPU_MEMORY_UTILIZATION: "0.95"
      MAX_CONCURRENCY: "64"
      RANDOM_RANGE_RATIO: "0.8"
      REQUEST_RATE: "inf"
      EXTRA_SERVER_ARGS: "--seed=42 --no-enable-prefix-caching --async-scheduling"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh
