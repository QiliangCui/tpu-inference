# Dev pipeline — Attempt 11c: investigate pl.loop unroll crash
# Minimal test to determine which unroll values work/crash with DMAs

steps:

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "pl.loop unroll test (minimal)"
    key: plloop_test
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    commands:
      - .buildkite/scripts/run_in_docker.sh python3 /workspace/tpu_inference/tests/e2e/benchmarking/test_plloop_unroll.py
