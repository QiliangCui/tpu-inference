# Auto-generated pipeline for model bring-up evaluation.
# This file is managed by agent-vllm. Do not edit manually.

steps:
  - label: ':docker: Build and Push Base Image (tpu7x)'
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "tpu7x Unit tests for Qwen/Qwen3.6-35B-A3B"
    key: "tpu7x_Qwen_Qwen3_6-35B-A3B_UnitTest"
    depends_on: tpu7x_build_docker
    env:
      TPU_VERSION: "tpu7x"
      USE_PREBUILT_IMAGE: "1"
    agents:
      queue: "tpu_v7x_8_queue"
    soft_fail: true
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'SKIP_JAX_PRECOMPILE=1 VLLM_XLA_CHECK_RECOMPILATION=0 MODEL_IMPL_TYPE=vllm python /workspace/tpu_inference/examples/offline_inference.py --model Qwen/Qwen3.6-35B-A3B --tensor-parallel-size 8 --max-model-len 2048 --max-num-batched-tokens 2048 --max-num-seqs 256'
  - label: "tpu7x Record unit test result for Qwen/Qwen3.6-35B-A3B"
    key: "tpu7x_record_Qwen_Qwen3_6-35B-A3B_UnitTest"
    depends_on: "tpu7x_Qwen_Qwen3_6-35B-A3B_UnitTest"
    env:
      CI_TPU_VERSION: "tpu7x"
      CI_TARGET: "Qwen/Qwen3.6-35B-A3B"
      CI_STAGE: "UnitTest"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh tpu7x_Qwen_Qwen3_6-35B-A3B_UnitTest

  - label: "tpu7x Accuracy for Qwen/Qwen3.6-35B-A3B"
    key: "tpu7x_Qwen_Qwen3_6-35B-A3B_Accuracy"
    depends_on: "tpu7x_record_Qwen_Qwen3_6-35B-A3B_UnitTest"
    env:
      TPU_VERSION: "tpu7x"
      USE_PREBUILT_IMAGE: "1"
    agents:
      queue: "tpu_v7x_8_queue"
    soft_fail: true
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/check_lm_eval.sh  --model_name "Qwen/Qwen3.6-35B-A3B" --use_moe_ep_kernel 0 --tensor_parallel_size 8 --max_model_len 2048 --max_num_batched_tokens 2048 --max_gen_toks 256 --enable_expert_parallel 0 --flex_threshold 0.6 --strict_threshold 0.6
  - label: "tpu7x Record accuracy result for Qwen/Qwen3.6-35B-A3B"
    key: "tpu7x_record_Qwen_Qwen3_6-35B-A3B_Accuracy"
    depends_on: "tpu7x_Qwen_Qwen3_6-35B-A3B_Accuracy"
    env:
      CI_TPU_VERSION: "tpu7x"
      CI_TARGET: "Qwen/Qwen3.6-35B-A3B"
      CI_STAGE: "Accuracy/Correctness"
      CI_CATEGORY: "text-only"
    agents:
      queue: cpu
    commands:
      - |
        .buildkite/scripts/record_step_result.sh tpu7x_Qwen_Qwen3_6-35B-A3B_Accuracy
