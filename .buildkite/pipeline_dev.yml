# Dev pipeline for tpu-inference-dev.
# Demo/sample steps showing how to run custom tests on tpu7x.
# Copy and adapt any step for your own experiments.
#
# HOW TO TRIGGER THIS PIPELINE
# 
# Option A - Buildkite UI:
#   Go to https://buildkite.com/tpu-commons/tpu-inference-dev
#   Click "New Build", set branch to your branch, click "Create Build".
#
# Option B - Buildkite API (requires BUILDKITE_API_TOKEN in your env):
#   curl -s -X POST \
#     -H "Authorization: Bearer $BUILDKITE_API_TOKEN" \
#     -H "Content-Type: application/json" \
#     "https://api.buildkite.com/v2/organizations/tpu-commons/pipelines/tpu-inference-dev/builds" \
#     -d "{\"commit\": \"$(git rev-parse HEAD)\", \"branch\": \"$(git rev-parse --abbrev-ref HEAD)\", \"message\": \"my test\"}"
#
# HOW TO CUSTOMIZE
# 
# 1. On your branch, edit this file - use any demo step below as a starting point.
# 2. Change the command, model, env vars, or queue as needed.
# 3. Trigger the pipeline - only your branch's file is used.

steps:

  # -----------------------------------------------------------------
  # Build Step (required by all demo steps below)
  # -----------------------------------------------------------------
  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # -----------------------------------------------------------------
  # Qwen/Qwen3.6-35B-A3B UnitTest
  # Use max-num-batched-tokens=16384 to satisfy MM budget check without
  # needing to pass limit-mm-per-prompt (avoids pydantic list/dict parsing issues).
  # -----------------------------------------------------------------
  - label: "tpu7x UnitTest Qwen/Qwen3.6-35B-A3B"
    key: tpu7x_Qwen36_35B_UnitTest
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_8_queue
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'SKIP_JAX_PRECOMPILE=1 VLLM_XLA_CHECK_RECOMPILATION=0 MODEL_IMPL_TYPE=vllm python /workspace/tpu_inference/examples/offline_inference.py --model Qwen/Qwen3.6-35B-A3B --tensor-parallel-size 8 --max-num-batched-tokens 16384 --max-num-seqs 256 --max-model-len 4096 --chat-template-kwargs="{\"enable_thinking\": false}"'

  # -----------------------------------------------------------------
  # Qwen/Qwen3.6-35B-A3B Accuracy
  # Use bash -c wrapper to inject VLLM_XLA_CHECK_RECOMPILATION=0 env var.
  # Pass limit_mm_per_prompt as single-quoted JSON matching Qwen3.5-397B reference.
  # -----------------------------------------------------------------
  - label: "tpu7x Accuracy Qwen/Qwen3.6-35B-A3B"
    key: tpu7x_Qwen36_35B_Accuracy
    depends_on: tpu7x_Qwen36_35B_UnitTest
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_8_queue
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash -c 'VLLM_XLA_CHECK_RECOMPILATION=0 SKIP_JAX_PRECOMPILE=1 MODEL_IMPL_TYPE=vllm bash /workspace/tpu_inference/tests/e2e/check_lm_eval.sh --model_name Qwen/Qwen3.6-35B-A3B --use_moe_ep_kernel 0 --tensor_parallel_size 8 --max_model_len 4096 --max_num_batched_tokens 4096 --max_gen_toks 2048 --enable_expert_parallel 0 --flex_threshold 0.60 --strict_threshold 0.55 --limit_mm_per_prompt {\"image\":0,\"video\":0} --enable_thinking false --block_size 256 --limit 100'

  # -----------------------------------------------------------------
  # Demo 1: offline_inference.py
  # -----------------------------------------------------------------
  - label: "tpu7x [demo] offline_inference.py"
    key: tpu7x_demo_offline_inference
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_2_queue
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash -c '
          python3 examples/offline_inference.py \
            --model Qwen/Qwen3-0.6B \
            --tensor-parallel-size 2 \
            --max-model-len 1024 \
            --max-tokens 128'

  # -----------------------------------------------------------------
  # Demo 2: vllm serve + vllm bench serve
  # -----------------------------------------------------------------
  - label: "tpu7x [demo] vllm serve + vllm bench serve"
    key: tpu7x_demo_serve_bench
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_2_queue
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash .buildkite/scripts/run_benchmark_demo.sh

  # -----------------------------------------------------------------
  # Demo 3: DCN-based P/D disaggregation
  # -----------------------------------------------------------------
  - label: "tpu7x [demo] E2E disaggregation (DCN P/D)"
    key: tpu7x_demo_disagg
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      MODEL: "Qwen/Qwen3-0.6B"
      INPUT_LEN: 1024
      OUTPUT_LEN: 128
      NUM_PROMPTS: 5
      RANDOM_SEED: 10
      MAX_CONCURRENCY: 4
      TEST_MODE: 1
    agents:
      queue: tpu_v7x_8_queue
    commands:
      - .buildkite/scripts/run_disagg.sh

  # -----------------------------------------------------------------
  # Demo 4: Ray-based multi-host inference
  # -----------------------------------------------------------------
  - label: "tpu7x [demo] Ray-based multi-host"
    key: tpu7x_demo_multihost
    env:
      TPU_VERSION: "tpu7x"
    agents:
      queue: tpu_v7x_16_queue
    commands:
      - |
        MODEL="gs://tpu-commons-ci/qwen/models--Qwen--Qwen3-30B-A3B/snapshots/ad44e777bcd18fa416d9da3bd8f70d33ebb85d39"
        .buildkite/scripts/run_multihost.sh \
          "vllm serve \${MODEL} \
            --port 8000 \
            --tensor-parallel-size 16 \
            --trust-remote-code \
            --max-model-len 1024 \
            --no-async-scheduling \
            --load-format=runai_streamer \
            --no-enable-prefix-caching" \
          "curl http://localhost:8000/v1/completions \
            -X POST \
            -H 'Content-Type: application/json' \
            -d '{\"model\": \"${MODEL}\", \"prompt\": \"San Francisco is a\", \"max_tokens\": 50}'"
