# Dev pipeline — Attempt 13: bt=128/256 × unrolled/fori_loop on 480B prefill
# Tests whether fori_loop helps at larger bt (more scatter iterations).
# bt=128: 1024 iterations. bt=256: 2048 iterations.
# Env vars: FUSED_EP_BT_OVERRIDE, FUSED_EP_USE_FORI_LOOP

steps:

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # === bt=128, unrolled (1024 iterations fully unrolled) ===
  - label: "bt128 UNROLLED fused_EP prefill-8K"
    key: bt128_unrolled
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8"
      TENSOR_PARALLEL_SIZE: "8"
      MAX_NUM_BATCHED_TOKENS: "8192"
      MAX_NUM_SEQS: "512"
      MAX_MODEL_LEN: "10240"
      INPUT_LEN: "8192"
      OUTPUT_LEN: "1"
      NUM_PROMPTS: "320"
      ENABLE_EXPERT_PARALLEL: "1"
      USE_MOE_EP_KERNEL: "1"
      FUSED_EP_BT_OVERRIDE: "128"
      FUSED_EP_USE_FORI_LOOP: "0"
      KV_CACHE_DTYPE: "fp8"
      GPU_MEMORY_UTILIZATION: "0.95"
      MAX_CONCURRENCY: "64"
      RANDOM_RANGE_RATIO: "0.8"
      REQUEST_RATE: "inf"
      EXTRA_SERVER_ARGS: "--seed=42 --no-enable-prefix-caching --async-scheduling"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh

  # === bt=128, fori_loop (1024 iterations, dynamic loop) ===
  - label: "bt128 FORI fused_EP prefill-8K"
    key: bt128_fori
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8"
      TENSOR_PARALLEL_SIZE: "8"
      MAX_NUM_BATCHED_TOKENS: "8192"
      MAX_NUM_SEQS: "512"
      MAX_MODEL_LEN: "10240"
      INPUT_LEN: "8192"
      OUTPUT_LEN: "1"
      NUM_PROMPTS: "320"
      ENABLE_EXPERT_PARALLEL: "1"
      USE_MOE_EP_KERNEL: "1"
      FUSED_EP_BT_OVERRIDE: "128"
      FUSED_EP_USE_FORI_LOOP: "1"
      KV_CACHE_DTYPE: "fp8"
      GPU_MEMORY_UTILIZATION: "0.95"
      MAX_CONCURRENCY: "64"
      RANDOM_RANGE_RATIO: "0.8"
      REQUEST_RATE: "inf"
      EXTRA_SERVER_ARGS: "--seed=42 --no-enable-prefix-caching --async-scheduling"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh

  # === bt=256, unrolled (2048 iterations fully unrolled) ===
  - label: "bt256 UNROLLED fused_EP prefill-8K"
    key: bt256_unrolled
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8"
      TENSOR_PARALLEL_SIZE: "8"
      MAX_NUM_BATCHED_TOKENS: "8192"
      MAX_NUM_SEQS: "512"
      MAX_MODEL_LEN: "10240"
      INPUT_LEN: "8192"
      OUTPUT_LEN: "1"
      NUM_PROMPTS: "320"
      ENABLE_EXPERT_PARALLEL: "1"
      USE_MOE_EP_KERNEL: "1"
      FUSED_EP_BT_OVERRIDE: "256"
      FUSED_EP_USE_FORI_LOOP: "0"
      KV_CACHE_DTYPE: "fp8"
      GPU_MEMORY_UTILIZATION: "0.95"
      MAX_CONCURRENCY: "64"
      RANDOM_RANGE_RATIO: "0.8"
      REQUEST_RATE: "inf"
      EXTRA_SERVER_ARGS: "--seed=42 --no-enable-prefix-caching --async-scheduling"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh

  # === bt=256, fori_loop (2048 iterations, dynamic loop) ===
