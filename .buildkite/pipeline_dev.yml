# Dev pipeline — MoE Backend Validation (3 jobs)
# Validate TP / GMM_EP / fused_ep_moe for Qwen3-Coder-30B-A3B-Instruct
# ISL=8192, OSL=1024, max-model-len=10240

steps:

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # Track A: TP (default, no EP)
  - label: "VALIDATE Qwen3-Coder TP bt1024 s128"
    key: validate_tp
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen3-Coder-30B-A3B-Instruct"
      TENSOR_PARALLEL_SIZE: "8"
      MAX_NUM_BATCHED_TOKENS: "1024"
      MAX_NUM_SEQS: "128"
      MAX_MODEL_LEN: "10240"
      INPUT_LEN: "8192"
      OUTPUT_LEN: "1024"
      NUM_PROMPTS: "50"
      ENABLE_EXPERT_PARALLEL: "0"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh

  # Track B: GMM_EP
  - label: "VALIDATE Qwen3-Coder GMM_EP bt1024 s128"
    key: validate_gmm_ep
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen3-Coder-30B-A3B-Instruct"
      TENSOR_PARALLEL_SIZE: "8"
      MAX_NUM_BATCHED_TOKENS: "1024"
      MAX_NUM_SEQS: "128"
      MAX_MODEL_LEN: "10240"
      INPUT_LEN: "8192"
      OUTPUT_LEN: "1024"
      NUM_PROMPTS: "50"
      ENABLE_EXPERT_PARALLEL: "1"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh

  # Track C: fused_ep_moe
  - label: "VALIDATE Qwen3-Coder fused_ep_moe bt1024 s128"
    key: validate_fused_ep
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen3-Coder-30B-A3B-Instruct"
      TENSOR_PARALLEL_SIZE: "8"
      MAX_NUM_BATCHED_TOKENS: "1024"
      MAX_NUM_SEQS: "128"
      MAX_MODEL_LEN: "10240"
      INPUT_LEN: "8192"
      OUTPUT_LEN: "1024"
      NUM_PROMPTS: "50"
      ENABLE_EXPERT_PARALLEL: "1"
      USE_MOE_EP_KERNEL: "1"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh
