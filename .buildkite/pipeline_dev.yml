# Dev pipeline — Attempt 10: fori_loop scatter on 30B
# 480B has only 64 iterations (bt=8) — IMEM not bottleneck there.
# 30B has 1024 iterations (bt=128) — 16x more code, severe IMEM pressure.
# This is where Jevin's IMEM overlay fix should show real improvement.

steps:

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # === 30B: fori_loop scatter vs GMM_EP baseline ===
  # Config matches build #261 baseline: BT=2048, S=256, ISL=8192, OSL=1024

  - label: "30B FORI_LOOP fused_EP ISL8K-OSL1K"
    key: fori_30b_fused_8k
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen3-Coder-30B-A3B-Instruct"
      TENSOR_PARALLEL_SIZE: "8"
      MAX_NUM_BATCHED_TOKENS: "2048"
      MAX_NUM_SEQS: "256"
      MAX_MODEL_LEN: "10240"
      INPUT_LEN: "8192"
      OUTPUT_LEN: "1024"
      NUM_PROMPTS: "200"
      ENABLE_EXPERT_PARALLEL: "1"
      USE_MOE_EP_KERNEL: "1"
      GPU_MEMORY_UTILIZATION: "0.95"
      MAX_CONCURRENCY: "64"
      RANDOM_RANGE_RATIO: "0.8"
      REQUEST_RATE: "inf"
      EXTRA_SERVER_ARGS: "--seed=42 --no-enable-prefix-caching --async-scheduling"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh

  - label: "30B BASELINE GMM_EP ISL8K-OSL1K"
    key: baseline_30b_gmm_8k
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen3-Coder-30B-A3B-Instruct"
      TENSOR_PARALLEL_SIZE: "8"
      MAX_NUM_BATCHED_TOKENS: "2048"
      MAX_NUM_SEQS: "256"
      MAX_MODEL_LEN: "10240"
      INPUT_LEN: "8192"
      OUTPUT_LEN: "1024"
      NUM_PROMPTS: "200"
      ENABLE_EXPERT_PARALLEL: "1"
      GPU_MEMORY_UTILIZATION: "0.95"
      MAX_CONCURRENCY: "64"
      RANDOM_RANGE_RATIO: "0.8"
      REQUEST_RATE: "inf"
      EXTRA_SERVER_ARGS: "--seed=42 --no-enable-prefix-caching --async-scheduling"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh

  # Historical 30B fused_EP baseline (build #261, unrolled): 1518 tok/s, TPOT=134.26ms
  # Compare fori_loop result against that.
