# Dev pipeline — Profile sweep VALIDATION (2 jobs only)
# Validate sweep_profile.sh works before full 64-job sweep.

steps:

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # Validation 1: small model, 2-chip
  - label: "VALIDATE sweep Qwen3-4B bt512 s128"
    key: validate_qwen3_4b
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_2_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen3-4B"
      TENSOR_PARALLEL_SIZE: "2"
      MAX_NUM_BATCHED_TOKENS: "512"
      MAX_NUM_SEQS: "128"
      INPUT_LEN: "1800"
      OUTPUT_LEN: "128"
      NUM_PROMPTS: "50"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh

  # Validation 2: medium model, 8-chip
  - label: "VALIDATE sweep Qwen2.5-32B bt512 s128"
    key: validate_qwen2_5_32b
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen2.5-32B"
      TENSOR_PARALLEL_SIZE: "8"
      MAX_NUM_BATCHED_TOKENS: "512"
      MAX_NUM_SEQS: "128"
      INPUT_LEN: "1800"
      OUTPUT_LEN: "128"
      NUM_PROMPTS: "50"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh
