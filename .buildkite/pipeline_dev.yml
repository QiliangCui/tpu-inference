# Dev pipeline — Attempt 9b: vmem_limit_bytes=48MB
# 32MB crashed (can't compile). Try 48MB as intermediate — less spilling
# than 100MB but enough room to compile.

steps:

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # === A/B: Mixed workload ISL=8K/OSL=1K (matches build #268 baseline) ===

  - label: "VMEM48 fused_EP ISL8K-OSL1K"
    key: vmem48_fused_8k
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8"
      TENSOR_PARALLEL_SIZE: "8"
      MAX_NUM_BATCHED_TOKENS: "8192"
      MAX_NUM_SEQS: "512"
      MAX_MODEL_LEN: "10240"
      INPUT_LEN: "8192"
      OUTPUT_LEN: "1024"
      NUM_PROMPTS: "320"
      ENABLE_EXPERT_PARALLEL: "1"
      USE_MOE_EP_KERNEL: "1"
      KV_CACHE_DTYPE: "fp8"
      GPU_MEMORY_UTILIZATION: "0.95"
      MAX_CONCURRENCY: "64"
      RANDOM_RANGE_RATIO: "0.8"
      REQUEST_RATE: "inf"
      EXTRA_SERVER_ARGS: "--seed=42 --no-enable-prefix-caching --async-scheduling"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh

  # === Baseline: GMM_EP for reference (same config as build #268) ===

  - label: "BASELINE GMM_EP ISL8K-OSL1K"
    key: baseline_gmm_8k
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8"
      TENSOR_PARALLEL_SIZE: "8"
      MAX_NUM_BATCHED_TOKENS: "8192"
      MAX_NUM_SEQS: "512"
      MAX_MODEL_LEN: "10240"
      INPUT_LEN: "8192"
      OUTPUT_LEN: "1024"
      NUM_PROMPTS: "320"
      ENABLE_EXPERT_PARALLEL: "1"
      KV_CACHE_DTYPE: "fp8"
      GPU_MEMORY_UTILIZATION: "0.95"
      MAX_CONCURRENCY: "64"
      RANDOM_RANGE_RATIO: "0.8"
      REQUEST_RATE: "inf"
      EXTRA_SERVER_ARGS: "--seed=42 --no-enable-prefix-caching --async-scheduling"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh

  # === Also test ISL=1K/OSL=8K (long decode, where fused_EP gap is smaller) ===

  - label: "VMEM48 fused_EP ISL1K-OSL8K"
    key: vmem48_fused_1k
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8"
      TENSOR_PARALLEL_SIZE: "8"
      MAX_NUM_BATCHED_TOKENS: "8192"
      MAX_NUM_SEQS: "512"
      MAX_MODEL_LEN: "10240"
      INPUT_LEN: "1024"
      OUTPUT_LEN: "8192"
      NUM_PROMPTS: "320"
      ENABLE_EXPERT_PARALLEL: "1"
      USE_MOE_EP_KERNEL: "1"
      KV_CACHE_DTYPE: "fp8"
      GPU_MEMORY_UTILIZATION: "0.95"
      MAX_CONCURRENCY: "64"
      RANDOM_RANGE_RATIO: "0.8"
      REQUEST_RATE: "inf"
      EXTRA_SERVER_ARGS: "--seed=42 --no-enable-prefix-caching --async-scheduling"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh

  - label: "BASELINE GMM_EP ISL1K-OSL8K"
    key: baseline_gmm_1k
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8"
      TENSOR_PARALLEL_SIZE: "8"
      MAX_NUM_BATCHED_TOKENS: "8192"
      MAX_NUM_SEQS: "512"
      MAX_MODEL_LEN: "10240"
      INPUT_LEN: "1024"
      OUTPUT_LEN: "8192"
      NUM_PROMPTS: "320"
      ENABLE_EXPERT_PARALLEL: "1"
      KV_CACHE_DTYPE: "fp8"
      GPU_MEMORY_UTILIZATION: "0.95"
      MAX_CONCURRENCY: "64"
      RANDOM_RANGE_RATIO: "0.8"
      REQUEST_RATE: "inf"
      EXTRA_SERVER_ARGS: "--seed=42 --no-enable-prefix-caching --async-scheduling"
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh
