# Dev pipeline — MoE Backend Full Sweep
# Qwen3-Coder-30B-A3B-Instruct: TP vs GMM_EP vs fused_ep_moe
# ISL=8192, OSL=1024, max-model-len=10240, 1000 prompts

steps:

  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  # -----------------------------------------------------------------
  # Track A: TP (default, no EP)
  # -----------------------------------------------------------------
  - label: "TP bt{{matrix.bt}} s{{matrix.s}}"
    key: sweep_tp
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen3-Coder-30B-A3B-Instruct"
      TENSOR_PARALLEL_SIZE: "8"
      MAX_NUM_BATCHED_TOKENS: "{{matrix.bt}}"
      MAX_NUM_SEQS: "{{matrix.s}}"
      MAX_MODEL_LEN: "10240"
      INPUT_LEN: "8192"
      OUTPUT_LEN: "1024"
      NUM_PROMPTS: "1000"
      ENABLE_EXPERT_PARALLEL: "0"
    matrix:
      setup:
        bt: ["512", "1024", "2048", "4096", "8192"]
        s: ["128", "256"]
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh

  # -----------------------------------------------------------------
  # Track B: GMM_EP
  # -----------------------------------------------------------------
  - label: "GMM_EP bt{{matrix.bt}} s{{matrix.s}}"
    key: sweep_gmm_ep
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen3-Coder-30B-A3B-Instruct"
      TENSOR_PARALLEL_SIZE: "8"
      MAX_NUM_BATCHED_TOKENS: "{{matrix.bt}}"
      MAX_NUM_SEQS: "{{matrix.s}}"
      MAX_MODEL_LEN: "10240"
      INPUT_LEN: "8192"
      OUTPUT_LEN: "1024"
      NUM_PROMPTS: "1000"
      ENABLE_EXPERT_PARALLEL: "1"
    matrix:
      setup:
        bt: ["512", "1024", "2048", "4096", "8192"]
        s: ["128", "256"]
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh

  # -----------------------------------------------------------------
  # Track C: fused_ep_moe
  # -----------------------------------------------------------------
  - label: "fused_EP bt{{matrix.bt}} s{{matrix.s}}"
    key: sweep_fused_ep
    depends_on: tpu7x_build_docker
    agents:
      queue: tpu_v7x_8_queue
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      TEST_MODEL: "Qwen/Qwen3-Coder-30B-A3B-Instruct"
      TENSOR_PARALLEL_SIZE: "8"
      MAX_NUM_BATCHED_TOKENS: "{{matrix.bt}}"
      MAX_NUM_SEQS: "{{matrix.s}}"
      MAX_MODEL_LEN: "10240"
      INPUT_LEN: "8192"
      OUTPUT_LEN: "1024"
      NUM_PROMPTS: "1000"
      ENABLE_EXPERT_PARALLEL: "1"
      USE_MOE_EP_KERNEL: "1"
    matrix:
      setup:
        bt: ["512", "1024", "2048", "4096", "8192"]
        s: ["128", "256"]
    commands:
      - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/sweep_profile.sh
